<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="SUBTERRA - Real-time groundwater monitoring system using DWLR data across India" />
    
    <title>SUBTERRA | Groundwater Monitoring System</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        color: white;
        overflow-x: hidden;
      }

      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        transition: opacity 0.5s ease-out;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .logo {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 72px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
        animation: fadeInDown 1s ease-out;
      }

      .tagline {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.8);
        margin-top: 10px;
        letter-spacing: 4px;
        text-transform: uppercase;
        animation: fadeIn 1s ease-out 0.5s both;
      }

      .water-drops {
        display: flex;
        gap: 12px;
        margin: 40px 0 20px;
      }

      .drop {
        width: 15px;
        height: 15px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out;
      }

      .drop:nth-child(1) { animation-delay: -0.32s; }
      .drop:nth-child(2) { animation-delay: -0.16s; }
      .drop:nth-child(3) { animation-delay: 0s; }

      @keyframes bounce {
        0%, 80%, 100% {
          transform: scale(0);
          opacity: 0.5;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .loading-text {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        letter-spacing: 2px;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #root {
        opacity: 0;
        transition: opacity 0.5s ease-in;
      }

      #root.loaded {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="loading-screen">
      <div class="logo">SUBTERRA</div>
      <div class="tagline">Groundwater Intelligence</div>
      <div class="water-drops">
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
      </div>
      <div class="loading-text">INITIALIZING SYSTEM...</div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          const root = document.getElementById('root');
          
          loadingScreen.classList.add('hidden');
          root.classList.add('loaded');
          
          setTimeout(function() {
            loadingScreen.remove();
          }, 500);
        }, 1000);
      });
    </script>
  </body>
</html>
