name: AquaPulse — Scheduled Data Pipeline

on:
  schedule:
    - cron: "*/15 * * * *"    # every 15 min — matches DWLR sensor frequency
    - cron: "30 20 * * *"     # daily 2 AM IST — full historical sync
  workflow_dispatch:
    inputs:
      task:
        description: "Which task to run"
        required: true
        default: all
        type: choice
        options: [all, task1, task2, task3, historical_sync]
      dry_run:
        description: "Dry run (no DB write)"
        required: false
        default: "false"
        type: boolean

env:
  PYTHON_VERSION: "3.11"

jobs:
  realtime-fetch:
    name: ⚡ Real-Time DWLR Fetch (15-min)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '*/15 * * * *')

    env:
      WRIS_API_KEY:    ${{ secrets.WRIS_API_KEY }}
      IMD_API_KEY:     ${{ secrets.IMD_API_KEY }}
      DATAGOV_API_KEY: ${{ secrets.DATAGOV_API_KEY }}
      DB_URL:          ${{ secrets.PROD_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Task 1 — Real-time water level fetch
        run: |
          ARGS="--task 1"
          [ "${{ github.event.inputs.dry_run }}" == "true" ] && ARGS="$ARGS --dry-run"
          python pipeline.py $ARGS

      - name: Run Task 2 — Recharge update
        run: python pipeline.py --task 2

      - name: Run Task 3 — Zone reclassification
        run: python pipeline.py --task 3

      - name: Check for P1 alerts
        id: alerts
        run: |
          COUNT=$(python scripts/check_alerts.py --priority P1 --count-only)
          echo "p1_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Fire PagerDuty if P1 alerts found
        if: steps.alerts.outputs.p1_count > 0
        run: |
          curl -X POST https://events.pagerduty.com/v2/enqueue \
            -H "Content-Type: application/json" \
            -d '{
              "routing_key": "${{ secrets.PAGERDUTY_KEY }}",
              "event_action": "trigger",
              "payload": {
                "summary": "${{ steps.alerts.outputs.p1_count }} P1 groundwater alerts — AquaPulse",
                "severity": "critical",
                "source": "AquaPulse CI/CD"
              }
            }'

      - name: Log pipeline run
        if: always()
        run: |
          python scripts/log_pipeline_run.py \
            --status "${{ job.status }}" \
            --run-id "${{ github.run_id }}" \
            --trigger "schedule-15min"

  daily-sync:
    name: 🔄 Daily Historical Sync
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' &&
       github.event.schedule == '30 20 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.task == 'historical_sync')

    env:
      WRIS_API_KEY:    ${{ secrets.WRIS_API_KEY }}
      IMD_API_KEY:     ${{ secrets.IMD_API_KEY }}
      DATAGOV_API_KEY: ${{ secrets.DATAGOV_API_KEY }}
      DB_URL:          ${{ secrets.PROD_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync historical water levels
        run: python pipeline.py --task 1 --historical

      - name: Sync CGWB block assessment
        run: python scripts/sync_block_assessment.py

      - name: Sync IMD rainfall archive
        run: python scripts/sync_rainfall.py --days 30

      - name: Data quality report
        run: python scripts/data_quality_report.py --output reports/dq_report.json

      - name: Upload DQ report
        uses: actions/upload-artifact@v4
        with:
          name: daily-dq-report-${{ github.run_number }}
          path: reports/dq_report.json
          retention-days: 30
```

---

## After creating all 3 files, your folder should look like:
```
FOSS-PROJECT/
└── .github/
    └── workflows/
        ├── ci.yml
        ├── cd.yml
        └── scheduled-pipeline.yml