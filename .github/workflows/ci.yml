name: AquaPulse CI — Test & Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Black format check
        run: black --check --diff backend/
        continue-on-error: true

      - name: isort import order check
        run: isort --check-only --diff backend/
        continue-on-error: true

      - name: Flake8 lint
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --exclude=__pycache__,.venv

  test:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_DB: aquapulse_test
          POSTGRES_USER: aquapulse
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: postgresql://aquapulse:testpassword@localhost:5432/aquapulse_test
      WRIS_API_KEY: ""
      IMD_API_KEY: ""
      DATAGOV_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r requirements-dev.txt

      - name: Apply DB schema
        run: |
          if [ -f backend/database/schema.sql ]; then
            psql $DB_URL -f backend/database/schema.sql
          else
            echo "No schema file found, skipping"
          fi

      - name: Run unit tests
        run: |
          mkdir -p reports
          if [ -d backend/tests/unit ]; then
            pytest backend/tests/unit/ \
              -v \
              --tb=short \
              --junitxml=reports/junit-unit.xml \
              --cov=backend/ \
              --cov-report=xml:reports/coverage.xml \
              --cov-report=term-missing \
              --cov-fail-under=50
          else
            echo "No unit tests found yet, skipping"
          fi

      - name: Run integration tests
        run: |
          if [ -d backend/tests/integration ]; then
            pytest backend/tests/integration/ \
              -v \
              --tb=short \
              --junitxml=reports/junit-integration.xml
          else
            echo "No integration tests found yet, skipping"
          fi

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit + Safety
        run: pip install bandit safety

      - name: Bandit SAST scan
        run: |
          mkdir -p reports
          bandit -r backend/ -f json -o reports/bandit.json || true

      - name: Safety dependency vulnerability check
        run: |
          safety check -r backend/requirements.txt \
            --json > reports/safety.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: reports/

  build-docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: aquapulse:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max